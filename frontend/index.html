<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footbally v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=VT323&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  min-height:100vh;display:flex;align-items:flex-start;justify-content:center;
  padding:1.5rem 1rem 3rem;
  background-color:#0e6630;
  background-image:repeating-linear-gradient(180deg,transparent,transparent 48px,rgba(0,0,0,.07) 48px,rgba(0,0,0,.07) 96px);
  color:#f1f5f9;
}
.pitch-bg{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:0;overflow:hidden;}
.pitch-bg svg{width:min(95vw,780px);opacity:.12;}
.container{position:relative;z-index:1;width:100%;max-width:700px;background:#083d1f;border-radius:18px;padding:1.4rem 1.8rem 2rem;border:2px solid rgba(255,255,255,.2);box-shadow:0 12px 50px rgba(0,0,0,.55);}
h1{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;line-height:1.1;}
h2{font-size:19px;font-weight:500;line-height:1.4;}
.vt{font-family:'VT323',monospace;}
.muted{color:#86efac;font-size:14px;}
.center{text-align:center;}
input,button{font-family:inherit;font-size:15px;padding:11px 16px;border:1px solid rgba(255,255,255,.18);background:#0a5c2e;color:#f1f5f9;border-radius:10px;}
input{width:100%;margin-bottom:12px;}
input:focus{outline:none;border-color:#f4c430;}
input::placeholder{color:#86efac;}
button{font-weight:600;cursor:pointer;transition:background .15s,transform .1s,box-shadow .15s;}
button:hover:not(:disabled){background:#0f6b35;box-shadow:0 0 12px rgba(244,196,48,.2);}
button:active:not(:disabled){transform:translateY(1px);}
button:disabled{opacity:.45;cursor:not-allowed;}
.btn-primary{background:#f4c430;border-color:#f4c430;color:#083d1f;}
.btn-primary:hover:not(:disabled){background:#f0b800!important;box-shadow:0 0 18px rgba(244,196,48,.45)!important;}
.btn-danger{background:#dc2626;border-color:#dc2626;color:#fff;}
.btn-danger:hover:not(:disabled){background:#b91c1c!important;}
.btn-row{display:flex;gap:10px;}
.btn-row button{flex:1;}
/* Top bar */
.top-bar{display:flex;justify-content:flex-end;align-items:center;gap:6px;margin-bottom:1.4rem;font-size:13px;color:#86efac;}
.conn-indicator{display:flex;align-items:center;gap:5px;}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0;transition:background .3s;}
.conn-dot.off{background:#dc2626;}
.top-sep{color:rgba(255,255,255,.2);margin:0 2px;}
.lang-btn{background:none!important;border:none;padding:2px 5px;color:#86efac;font-size:13px;cursor:pointer;font-family:inherit;font-weight:400;border-radius:4px;transition:color .15s;}
.lang-btn:hover:not(:disabled){background:none!important;color:#f1f5f9;box-shadow:none!important;}
.lang-btn.active{color:#f4c430;font-weight:700;}
/* Mode pill */
.mode-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:10px;background:rgba(244,196,48,.12);border:1px solid rgba(244,196,48,.3);color:#f4c430;}
.mode-pill.hard{background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.3);color:#fca5a5;}
.mode-pill.career{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.3);color:#c4b5fd;}
.mode-pill.squad{background:rgba(6,182,212,.12);border-color:rgba(6,182,212,.3);color:#67e8f9;}
.mode-pill.hl{background:rgba(249,115,22,.12);border-color:rgba(249,115,22,.3);color:#fdba74;}
/* Lobby */
.lobby-player{display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(0,0,0,.22);border-radius:8px;margin-bottom:8px;border:1px solid rgba(255,255,255,.07);}
.badge-host{background:#f4c430;color:#083d1f;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;letter-spacing:1px;}
.code-display{font-family:ui-monospace,monospace;font-size:30px;font-weight:700;letter-spacing:6px;background:rgba(0,0,0,.3);padding:14px;border-radius:10px;margin:.8rem 0;text-align:center;border:1px solid rgba(255,255,255,.1);color:#f4c430;}
.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;}
/* Timer */
.timer-bar-wrap{height:6px;background:rgba(0,0,0,.35);border-radius:3px;margin-bottom:1.8rem;overflow:hidden;}
.timer-bar{height:100%;background:#f4c430;transition:width .1s linear;}
/* Options */
.options-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;}
.opt-btn{padding:13px 15px;text-align:left;display:flex;align-items:center;gap:12px;background:#0a5c2e;}
.opt-btn.correct{background:#065f46!important;border-color:#10b981!important;animation:correct-flash .35s ease-out;}
.opt-btn.wrong{background:#7f1d1d!important;border-color:#dc2626!important;animation:wrong-flash .25s ease-out;}
.opt-btn.used-wrong{background:#3b1f1f!important;border-color:#7f1d1d!important;opacity:.55;}
.opt-letter{width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#f4c430;}
/* Leaderboard */
.leaderboard-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(0,0,0,.22);border-radius:8px;margin-bottom:6px;border:1px solid rgba(255,255,255,.06);}
.rank{width:24px;text-align:center;font-weight:700;color:#86efac;}
/* Podium */
.podium{display:flex;align-items:flex-end;justify-content:center;gap:6px;margin:1.4rem 0;}
.podium-col{display:flex;flex-direction:column;align-items:center;flex:1;max-width:160px;}
.podium-block{width:100%;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:28px;color:rgba(0,0,0,.4);}
.podium-block.p1{height:100px;background:linear-gradient(180deg,#f4c430,#d4a017);}
.podium-block.p2{height:72px;background:linear-gradient(180deg,#cbd5e1,#94a3b8);}
.podium-block.p3{height:52px;background:linear-gradient(180deg,#cd7f32,#9a5f22);}
.podium-name{font-weight:700;font-size:13px;text-align:center;margin-bottom:4px;}
.podium-score{font-size:12px;color:#86efac;margin-bottom:6px;}
.podium-crown{font-size:22px;margin-bottom:4px;}
/* Mode select grid */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
@media(max-width:420px){.mode-grid{grid-template-columns:1fr;}}
.mode-card{display:flex;flex-direction:column;gap:5px;padding:16px;border-radius:12px;background:#0a5c2e;border:2px solid rgba(255,255,255,.1);cursor:pointer;transition:border-color .18s,box-shadow .18s,transform .1s;text-align:left;width:100%;}
.mode-card:hover{border-color:#f4c430;box-shadow:0 0 18px rgba(244,196,48,.2);}
.mode-card:active{transform:translateY(1px);}
.mode-card.career-card:hover{border-color:#8b5cf6;box-shadow:0 0 18px rgba(139,92,246,.2);}
.mode-card.squad-card:hover{border-color:#06b6d4;box-shadow:0 0 18px rgba(6,182,212,.2);}
.mode-card.hl-card:hover{border-color:#f97316;box-shadow:0 0 18px rgba(249,115,22,.2);}
.mode-icon{font-size:26px;margin-bottom:2px;}
.mode-card-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;line-height:1.1;}
.mode-card-sub{font-size:12px;color:#86efac;line-height:1.3;}
.tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;margin-top:4px;}
.tag-purple{background:#7c3aed;color:#fff;}
.tag-cyan{background:#0891b2;color:#fff;}
.tag-orange{background:#f97316;color:#fff;}
/* Settings */
.settings-section{margin-bottom:1.4rem;}
.settings-label{font-family:'VT323',monospace;font-size:18px;color:#f4c430;letter-spacing:2px;margin-bottom:8px;}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;}
.chip{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:600;background:#0a5c2e;border:2px solid rgba(255,255,255,.15);color:#86efac;cursor:pointer;transition:all .15s;}
.chip:hover:not(:disabled){border-color:#f4c430;color:#f4c430;}
.chip.active{background:rgba(244,196,48,.15);border-color:#f4c430;color:#f4c430;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07);}
.toggle-label{font-size:14px;color:#f1f5f9;}
.toggle-sublabel{font-size:12px;color:#86efac;margin-top:2px;}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#1a5c34;border-radius:12px;cursor:pointer;transition:background .2s;}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#f1f5f9;border-radius:50%;transition:transform .2s;}
.toggle input:checked+.toggle-slider{background:#f4c430;}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px);}
/* Warnings / info */
.warning-box{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-top:1rem;}
.info-box{background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#fde68a;margin-top:1rem;}
.error{color:#fca5a5;font-size:13px;margin-top:8px;text-align:center;}
/* Score flash */
.score-flash{font-size:18px;font-weight:700;animation:score-pop .5s cubic-bezier(.34,1.56,.64,1) forwards;}
/* Career Path mode */
.career-table{width:100%;border-collapse:collapse;margin:1rem 0;font-family:'VT323',monospace;font-size:18px;}
.career-table th{color:#f4c430;padding:4px 8px;text-align:left;border-bottom:1px solid rgba(244,196,48,.3);font-size:14px;letter-spacing:1px;}
.career-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.06);}
.career-table .club-hidden{color:#4ade80;letter-spacing:2px;}
.hints-strip{display:flex;gap:8px;margin:1rem 0;flex-wrap:wrap;}
.hint-badge{padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600;border:1px dashed rgba(255,255,255,.25);color:#86efac;background:rgba(0,0,0,.2);}
.hint-badge.revealed{border-color:#a78bfa;color:#c4b5fd;background:rgba(139,92,246,.12);}
.hint-badge.empty{opacity:.35;}
.career-guesses{font-family:'VT323',monospace;font-size:20px;color:#f4c430;margin-bottom:8px;letter-spacing:2px;}
/* Squad Builder */
.squad-header{margin-bottom:1rem;}
.squad-club{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:#f4c430;}
.squad-instruction{font-size:13px;color:#86efac;}
.squad-counter{font-family:'VT323',monospace;font-size:22px;color:#f4c430;margin:.8rem 0;letter-spacing:2px;}
.squad-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
@media(max-width:500px){.squad-grid{grid-template-columns:repeat(3,1fr);}}
.squad-card{padding:10px 8px;border-radius:10px;border:2px solid rgba(255,255,255,.12);background:#0a5c2e;cursor:pointer;text-align:center;transition:all .15s;user-select:none;}
.squad-card:hover{border-color:rgba(255,255,255,.3);}
.squad-card.selected{border-color:#4ade80;background:rgba(74,222,128,.12);}
.squad-card.correct-card{border-color:#10b981!important;background:rgba(16,185,129,.15)!important;}
.squad-card.wrong-card{border-color:#dc2626!important;background:rgba(220,38,38,.12)!important;opacity:.7;}
.squad-card.missed-card{border-color:#f59e0b!important;background:rgba(245,158,11,.1)!important;}
.squad-card-name{font-size:12px;font-weight:600;line-height:1.3;margin-top:4px;}
.squad-card-pos{font-size:10px;color:#86efac;margin-top:2px;}
/* Higher or Lower */
.hl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;}
.hl-streak{font-family:'VT323',monospace;font-size:24px;color:#f4c430;letter-spacing:1px;}
.hl-cards{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-bottom:1.4rem;}
.hl-card{background:rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:16px;text-align:center;}
.hl-card.active{border-color:#f4c430;}
.hl-player-name{font-weight:700;font-size:15px;line-height:1.3;}
.hl-player-info{font-size:12px;color:#86efac;margin-top:4px;}
.hl-value{font-family:'VT323',monospace;font-size:32px;color:#f4c430;margin-top:8px;letter-spacing:1px;}
.hl-value.hidden{color:#475569;}
.hl-vs{font-family:'Bebas Neue',sans-serif;font-size:28px;color:rgba(255,255,255,.3);text-align:center;}
.hl-buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem;}
.hl-btn{padding:18px;font-size:18px;font-weight:700;border-radius:12px;letter-spacing:1px;}
.hl-btn.higher{background:rgba(74,222,128,.15);border-color:#4ade80;color:#4ade80;}
.hl-btn.higher:hover:not(:disabled){background:rgba(74,222,128,.25)!important;box-shadow:0 0 18px rgba(74,222,128,.3)!important;}
.hl-btn.lower{background:rgba(248,113,113,.15);border-color:#f87171;color:#f87171;}
.hl-btn.lower:hover:not(:disabled){background:rgba(248,113,113,.25)!important;box-shadow:0 0 18px rgba(248,113,113,.3)!important;}
.hl-bank-btn{width:100%;padding:10px;font-size:13px;background:rgba(0,0,0,.2);border-color:rgba(255,255,255,.2);color:#86efac;}
.hl-result-overlay{text-align:center;padding:1rem;font-family:'VT323',monospace;font-size:22px;}
/* Past games */
.history-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:8px;margin-bottom:6px;font-size:13px;border:1px solid rgba(255,255,255,.06);}
.history-rank{font-family:'VT323',monospace;font-size:20px;width:28px;text-align:center;}
.history-meta{flex:1;line-height:1.5;}
.history-score{font-family:'VT323',monospace;font-size:20px;color:#f4c430;}
/* Animations */
@keyframes correct-flash{0%{transform:scale(1);}40%{transform:scale(1.025);box-shadow:0 0 20px rgba(16,185,129,.5);}100%{transform:scale(1);}}
@keyframes wrong-flash{0%{transform:scale(1);}25%{transform:scale(.97) translateX(-3px);}60%{transform:scale(.97) translateX(3px);}100%{transform:scale(1);}}
@keyframes ball-in{from{transform:translateX(-24px) scale(.4);opacity:0;}to{transform:translateX(0) scale(1);opacity:1;}}
.ball-anim{display:inline-block;animation:ball-in .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes score-pop{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(540deg);opacity:0;}}
@keyframes slide-in{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}
.slide-in{animation:slide-in .3s ease-out;}
/* Responsive */
@media(max-width:480px){
  .container{padding:1.1rem 1rem 1.5rem;}
  h1{font-size:30px;}
  .code-display{font-size:24px;letter-spacing:4px;}
  .options-grid{grid-template-columns:1fr;}
  .hl-cards{grid-template-columns:1fr;gap:8px;}
  .hl-vs{display:none;}
}
</style>
</head>

function saveMatch(leaderboard) {
  const myEntry = leaderboard.find(p => p.name === myName);
  const record = {
    id:            Date.now(),
    date:          new Date().toISOString(),
    mode:          roomSettings.gameMode,
    pool:          roomSettings.playerPool,
    difficulty:    roomSettings.difficulty,
    questionCount: roomSettings.questionCount,
    players:       leaderboard.map(p => ({ name: p.name, score: p.score })),
    myScore:       myEntry?.score ?? 0,
    myRank:        myEntry ? leaderboard.indexOf(myEntry)+1 : null,
  };
  const history = JSON.parse(localStorage.getItem('footbally_history')||'[]');
  history.unshift(record);
  localStorage.setItem('footbally_history', JSON.stringify(history.slice(0,20)));
}

async function startCreate() {
  const errEl  = document.getElementById('create-error');
  const loadEl = document.getElementById('create-loading');
  if (!errEl) return;
  roomSettings = { ...draftSettings };
  errEl.style.display  = 'none';
  loadEl.style.display = '';
  loadEl.textContent   = t('connWaking');
  document.querySelectorAll('.chip,.btn-primary,.btn-row button').forEach(b => b.disabled = true);
  try {
    const res  = await fetch(`${BACKEND_URL}/create-room`, { method:'POST' });
    const { code } = await res.json();
    loadEl.style.display = 'none';
    joinRoom(code);
  } catch (err) {
    loadEl.style.display = 'none';
    document.querySelectorAll('.chip,.btn-primary,.btn-row button').forEach(b => b.disabled = false);
    errEl.style.display = '';
    errEl.innerHTML = `${t('connError')} — <button onclick="startCreate()" style="background:none;border:none;color:#f4c430;cursor:pointer;font-size:13px;padding:0;font-weight:600;">${t('connRetry')}</button>`;
  }
}

function joinRoom(code) {
  currentCode = code; myScore = 0;
  if (!socket) { socket = io(BACKEND_URL); setupSocketHandlers(); }
  socket.emit('join_room', { code, name: myName }, (res) => {
    if (!res.ok) { const el = document.getElementById('error'); if (el) el.textContent = res.error; return; }
    isHost = res.isHost;
    // Only guests take settings from server; the host already has the right settings from startCreate
    if (!isHost && res.settings) roomSettings = res.settings;
    if (isHost && isSolo) {
      socket.emit('start_game', { settings: roomSettings }, r => {
        if (!r?.ok) alert(r?.error || 'Hata');
      });
      return;
    }
    if (isHost) socket.emit('update_settings', roomSettings);
    renderLobby([]);
  });
}

// ── Question (Quickfire & Career) ─────────────────────────────────────────────
let qStartTs = 0, timerRaf = null, answered = false;

function renderQuestion(data) {
  const { index, total, questionTR, questionEN, subTR, subEN, options, optionsTR, durationMs, questionType, careerSteps, hints, squadClub, squadPlayers } = data;

  if (questionType === 'career_challenge') {
    renderCareerQuestion(data);
    return;
  }
  if (questionType === 'squad_builder') {
    renderSquadQuestion(data);
    return;
  }

  qStartTs = Date.now(); answered = false;
  if (timerRaf) cancelAnimationFrame(timerRaf);

  const question = lang==='en' ? (questionEN||questionTR) : questionTR;
  const sub      = lang==='en' ? (subEN||subTR) : subTR;

  _optionsDisplayMap = optionsTR ? Object.fromEntries(options.map((o,i)=>[o,optionsTR[i]])) : null;
  const displayOpts  = (lang==='tr' && optionsTR) ? optionsTR : options;

  render(`
    <div class="header-row">
      <span class="muted">${t('question')} ${index+1} / ${total}</span>
      <span style="font-size:13px;color:#86efac;">${t('code')}: ${currentCode}</span>
    </div>
    <div class="timer-bar-wrap"><div id="timer-bar" class="timer-bar" style="width:100%"></div></div>
    <div class="center" style="margin-bottom:1.8rem;min-height:76px;">
      <h2>${question}</h2>
      ${sub?`<p class="muted" style="margin-top:8px;">${sub}</p>`:''}
    </div>
    <div class="options-grid">
      ${options.map((opt,i)=>`
        <button class="opt-btn" data-opt="${encodeURIComponent(opt)}">
          <span class="opt-letter">${String.fromCharCode(65+i)}</span>
          <span>${displayOpts[i]}</span>
        </button>`).join('')}
    </div>
    <div id="feedback" class="center muted" style="margin-top:1.4rem;min-height:24px;"></div>
  `);

  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.onclick = () => {
      if (answered) return;
      answered = true;
      const opt = decodeURIComponent(btn.dataset.opt);
      socket.emit('submit_answer', { answer: opt });
      document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
      btn.style.borderColor = '#f4c430';
      document.getElementById('feedback').textContent = t('answerSubmitted');
    };
  });

  startTimer(durationMs);
}

function startTimer(durationMs) {
  const bar = document.getElementById('timer-bar');
  if (!bar) return;
  const tick = () => {
    const elapsed   = Date.now() - qStartTs;
    const remaining = Math.max(0, durationMs - elapsed);
    bar.style.width = (remaining / durationMs * 100) + '%';
    if      (remaining > durationMs*.5)  bar.style.background = '#f4c430';
    else if (remaining > durationMs*.25) bar.style.background = '#f59e0b';
    else                                 bar.style.background = '#dc2626';
    if (remaining > 0) timerRaf = requestAnimationFrame(tick);
  };
  timerRaf = requestAnimationFrame(tick);
}

// ── Career Path Question ──────────────────────────────────────────────────────
function renderCareerQuestion(data) {
  const { index, total, options, durationMs, careerSteps, hints } = data;
  _careerRevealedHints = [];
  _careerWrongAnswers  = [];
  _careerGuessesLeft   = 4;
  qStartTs = Date.now(); answered = false;
  if (timerRaf) cancelAnimationFrame(timerRaf);

  const renderCareerUI = () => {
    const hintBadges = (hints||[]).map((h,i) => {
      const revealed = _careerRevealedHints[i];
      if (revealed) {
        const val = (lang==='tr' && h.valueTR) ? h.valueTR : h.value;
        const label = lang==='tr' ? h.labelTR : h.labelEN;
        return `<div class="hint-badge revealed" title="${label}">${label}: <strong>${val}</strong></div>`;
      }
      return `<div class="hint-badge empty">★</div>`;
    }).join('');

    const optBtns = options.map((opt,i) => {
      const isWrong   = _careerWrongAnswers.includes(opt);
      const isCorrect = answered && opt === data.correct;
      return `<button class="opt-btn ${isWrong?'used-wrong':''} ${isCorrect?'correct':''}" data-opt="${encodeURIComponent(opt)}" ${isWrong||answered?'disabled':''}>
        <span class="opt-letter">${String.fromCharCode(65+i)}</span>
        <span>${opt}</span>
      </button>`;
    }).join('');

    const rows = (careerSteps||[]).map(s =>
      `<tr><td>${s.year}</td><td class="club-hidden">${s.club}</td><td>${s.apps}</td><td>${s.goals}</td></tr>`
    ).join('');

    root.innerHTML = `
      <div class="header-row">
        <span class="muted">${t('question')} ${index+1} / ${total}</span>
        <span style="font-size:13px;color:#86efac;">${t('code')}: ${currentCode}</span>
      </div>
      <div class="timer-bar-wrap"><div id="timer-bar" class="timer-bar" style="width:100%"></div></div>
      <div class="career-guesses vt">${t('careerGuessTitle')} — ${_careerGuessesLeft} ${t('careerHintsLeft')}</div>
      <table class="career-table">
        <thead><tr><th>YEAR</th><th>CLUB</th><th>APPS</th><th>GOALS</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="hints-strip">${hintBadges}</div>
      <div class="options-grid">${optBtns}</div>
      <div id="feedback" class="center muted" style="margin-top:1rem;min-height:24px;"></div>
    `;

    document.querySelectorAll('.opt-btn:not([disabled])').forEach(btn => {
      btn.onclick = () => {
        if (answered) return;
        const opt = decodeURIComponent(btn.dataset.opt);
        _lastCareerAnswer = opt;
        socket.emit('submit_answer', { answer: opt });
        btn.disabled = true;
      };
    });

    startTimer(durationMs);
  };

  renderCareerUI();

  // Expose refresh fn for hint reveals
  window._refreshCareerUI = renderCareerUI;
}

// ── Squad Builder Question ────────────────────────────────────────────────────
function renderSquadQuestion(data) {
  const { index, total, squadClub, squadPlayers, durationMs } = data;
  _squadSelected  = [];
  _squadPlayers   = (squadPlayers || []).map(p => ({ ...p, id: String(p.id) }));
  _squadCorrectIds = null;
  qStartTs = Date.now(); answered = false;
  if (timerRaf) cancelAnimationFrame(timerRaf);

  const renderSquadUI = () => {
    const cards = _squadPlayers.map(p => {
      const sel = _squadSelected.includes(p.id);
      const cls = _squadCorrectIds
        ? (_squadCorrectIds.includes(p.id) ? (sel?'correct-card':'missed-card') : (sel?'wrong-card':''))
        : (sel ? 'selected' : '');
      return `<div class="squad-card ${cls}" data-id="${p.id}" onclick="toggleSquad('${p.id}')">
        <div style="font-size:22px;">👤</div>
        <div class="squad-card-name">${p.name}</div>
        <div class="squad-card-pos">${displayPos(p.position)}</div>
      </div>`;
    }).join('');

    root.innerHTML = `
      <div class="header-row">
        <span class="muted">${t('question')} ${index+1} / ${total}</span>
        <span style="font-size:13px;color:#86efac;">${t('code')}: ${currentCode}</span>
      </div>
      <div class="timer-bar-wrap"><div id="timer-bar" class="timer-bar" style="width:100%"></div></div>
      <div class="squad-header">
        <div class="squad-club">${squadClub}</div>
        <div class="squad-instruction">${t('squadInstruction')}</div>
      </div>
      <div class="squad-counter vt">${_squadSelected.length} / 8 ${t('squadSelected')}</div>
      <div class="squad-grid" id="squad-grid">${cards}</div>
      ${!_squadCorrectIds ? `<button class="btn-primary" style="width:100%;" onclick="submitSquad()">${t('squadSubmit')}</button>` : ''}
      <div id="feedback" class="center muted" style="margin-top:.8rem;min-height:20px;"></div>
    `;

    if (!_squadCorrectIds) startTimer(durationMs);
  };

  window._refreshSquadUI = renderSquadUI;
  renderSquadUI();
}

function toggleSquad(id) {
  if (_squadCorrectIds) return;
  const idx = _squadSelected.indexOf(id);
  if (idx >= 0) _squadSelected.splice(idx,1);
  else if (_squadSelected.length < 8) _squadSelected.push(id);
  if (window._refreshSquadUI) window._refreshSquadUI();
}

function submitSquad() {
  if (answered) return;
  answered = true;
  socket.emit('submit_squad', { selected: _squadSelected });
  document.getElementById('feedback').textContent = t('answerSubmitted');
}

// ── Higher or Lower ───────────────────────────────────────────────────────────
function renderHLScreen() {
  if (_hlDone) {
    root.innerHTML = `
      <div class="hl-result-overlay">
        <div style="font-size:48px;margin-bottom:1rem;">🏦</div>
        <div style="color:#f4c430;">${_hlScore.toLocaleString()} pts</div>
        <p class="muted" style="margin-top:.5rem;">${t('hlBanked')}</p>
        ${!isSolo ? `<p class="muted" style="font-size:13px;margin-top:.5rem;">${t('waitingHost')}</p>` : ''}
      </div>`;
    return;
  }

  const leftPlayer  = _hlLeft;
  const rightPlayer = _hlRight;
  const mult        = _hlMult;
  const streak      = _hlStreak;

  root.innerHTML = `
    <div class="hl-header">
      <div class="hl-streak vt">🔥 ${t('hlStreak')}: ${streak} × ${mult}</div>
      <div style="font-family:'VT323',monospace;font-size:20px;color:#86efac;">${_hlScore.toLocaleString()} pts</div>
    </div>
    <div class="hl-cards">
      <div class="hl-card active">
        <div class="hl-player-name">${leftPlayer?.name||'—'}</div>
        <div class="hl-player-info">${leftPlayer?.club||''}</div>
        <div class="hl-value">${formatMV(_hlLeftValue)}</div>
      </div>
      <div class="hl-vs">VS</div>
      <div class="hl-card">
        <div class="hl-player-name">${rightPlayer?.name||'—'}</div>
        <div class="hl-player-info">${rightPlayer?.club||''}</div>
        <div class="hl-value hidden">???</div>
      </div>
    </div>
    <div class="hl-buttons">
      <button class="hl-btn higher" onclick="hlAnswer('higher')">${t('hlHigher')}</button>
      <button class="hl-btn lower"  onclick="hlAnswer('lower')">${t('hlLower')}</button>
    </div>
    <button class="hl-bank-btn" onclick="hlBank()">${t('hlBank')} (${_hlScore.toLocaleString()} pts)</button>
  `;
}

function hlAnswer(direction) {
  if (_hlDone) return;
  document.querySelectorAll('.hl-btn').forEach(b => b.disabled = true);
  socket.emit('hl_answer', { direction });
}

function hlBank() {
  if (_hlDone) return;
  socket.emit('hl_bank');
}

function handleHLResult(data) {
  const { correct, revealedValue, streak, multiplier, gained, totalScore, done, banked, chainEnd, nextPlayer } = data;

  if (banked || chainEnd) {
    _hlDone  = true;
    _hlScore = totalScore || _hlScore;
    renderHLScreen();
    return;
  }

  // Show revealed value briefly, then advance
  _hlStreak = streak  || 0;
  _hlMult   = multiplier || 1;
  _hlScore  = totalScore || _hlScore;

  if (!correct || done) {
    _hlDone = true;
    root.innerHTML = `
      <div class="hl-result-overlay">
        <div style="font-size:48px;margin-bottom:.5rem;">${correct?'✅':'❌'}</div>
        <div style="font-family:'VT323',monospace;font-size:28px;color:#f4c430;">${formatMV(revealedValue)}</div>
        <div style="margin:.5rem 0;color:#86efac;">${_hlScore.toLocaleString()} pts</div>
        ${!isSolo ? `<p class="muted" style="font-size:13px;">${t('waitingHost')}</p>` : ''}
      </div>`;
    return;
  }

  // Correct — slide to next
  _hlLeft      = _hlRight;
  _hlLeftValue = revealedValue;
  _hlRight     = nextPlayer || null;
  _hlPos++;
  renderHLScreen();
}

// ── Answer Ack ────────────────────────────────────────────────────────────────
function handleAnswerAck({ correct, gained, outOfHints }) {
  myScore += gained || 0;
  const fb = document.getElementById('feedback');
  if (!fb) return;
  if (correct) {
    answered = true;
    document.querySelectorAll('.opt-btn').forEach(b => {
      b.disabled = true;
      const opt = decodeURIComponent(b.dataset.opt || '');
      if (opt === _lastCareerAnswer) b.classList.add('correct');
    });
    _lastCareerAnswer = null;
    fb.innerHTML = `<span class="score-flash" style="color:#4ade80;">✓ ${t('answerCorrect')}</span> <span class="score-flash" style="color:#f4c430;">+${(gained||0).toLocaleString()}</span>`;
  } else if (outOfHints) {
    answered = true;
    _lastCareerAnswer = null;
    document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
    fb.innerHTML = `<span style="color:#f87171;">${t('careerOutOfHints')}</span>`;
  } else {
    // Quickfire / career-without-hints wrong answer
    fb.innerHTML = `<span class="score-flash" style="color:#f87171;">✗ ${t('answerWrong')}</span>`;
  }
}

// ── Reveal ────────────────────────────────────────────────────────────────────
function renderReveal({ correct, correctIds, leaderboard, realClubs }) {
  cancelAnimationFrame(timerRaf);

  if (correctIds) {
    // Squad builder reveal
    _squadCorrectIds = correctIds.map(String);
    if (window._refreshSquadUI) window._refreshSquadUI();
    const fb = document.getElementById('feedback');
    if (fb) fb.innerHTML = `<div style="margin-top:.5rem;text-align:left;max-width:360px;margin:0 auto;">${leaderboard.slice(0,5).map((p,i)=>`<div class="leaderboard-row"><span class="rank">${medalIcon(i+1)}</span><span style="flex:1;">${p.name}</span><span style="font-weight:600;color:#f4c430;">${p.score.toLocaleString()}</span></div>`).join('')}</div>`;
    return;
  }

  // Career / Quickfire reveal
  const displayCorrect = (lang==='tr' && _optionsDisplayMap?.[correct]) ? _optionsDisplayMap[correct] : (correct||'');

  document.querySelectorAll('.opt-btn').forEach(btn => {
    const opt = decodeURIComponent(btn.dataset.opt);
    btn.disabled = true;
    if (opt === correct) btn.classList.add('correct');
    else if (!btn.classList.contains('used-wrong')) btn.style.opacity = '0.35';
  });

  // Unhide career clubs with real names from server
  document.querySelectorAll('.club-hidden').forEach((el,i) => {
    const name = (realClubs||[])[i];
    if (name) el.textContent = name;
    el.style.color = '#f4c430';
  });

  const fb = document.getElementById('feedback');
  if (fb && correct) {
    fb.innerHTML = `
      <div style="margin-bottom:10px;">
        <span class="ball-anim">⚽</span>
        ${t('correctAnswer')} <strong style="color:#f4c430;">${displayCorrect}</strong>
      </div>
      ${roomSettings.showLeaderboardLive ? `<div style="text-align:left;max-width:360px;margin:0 auto;">${leaderboard.slice(0,5).map((p,i)=>`<div class="leaderboard-row"><span class="rank">${medalIcon(i+1)}</span><span style="flex:1;">${p.name}</span><span style="font-weight:600;color:#f4c430;">${p.score.toLocaleString()}</span></div>`).join('')}</div>` : ''}
    `;
  }
}

// ── Game Over ─────────────────────────────────────────────────────────────────
function renderGameOver({ leaderboard }) {
  _lastRender = () => renderGameOver({ leaderboard });
  saveMatch(leaderboard);

  if (isSolo) {
    const myEntry = leaderboard[0];
    render(`
      <div class="center" style="padding:2rem 1rem;">
        <div style="font-size:58px;line-height:1;margin-bottom:8px;">🎉</div>
        <h1 style="font-size:32px;letter-spacing:3px;">${t('matchOver')}</h1>
        <div style="font-family:'VT323',monospace;font-size:54px;color:#f4c430;margin:1rem 0;line-height:1;">
          ${(myEntry?.score||0).toLocaleString()}
        </div>
        <p class="muted" style="margin-bottom:1.8rem;">pts</p>
        <div class="btn-row" style="max-width:320px;margin:0 auto 8px;">
          <button id="play-again-btn" class="btn-primary">${t('playAgain')}</button>
          <button id="home-btn">${t('goHome')}</button>
        </div>
        <button id="history-btn" style="width:100%;max-width:320px;margin:0 auto;display:block;font-size:13px;opacity:.8;">${t('pastGames')}</button>
      </div>
    `);
    document.getElementById('play-again-btn').onclick = () => {
      socket.emit('rematch', res => { if (!res?.ok) alert(res?.error||'Hata'); });
    };
    document.getElementById('home-btn').onclick = () => { socket?.disconnect(); isSolo = false; location.reload(); };
    document.getElementById('history-btn').onclick = renderPastGames;
    setTimeout(launchConfetti, 150);
    return;
  }

  const top3   = leaderboard.slice(0,3);
  const rest   = leaderboard.slice(3);
  const winner = leaderboard[0];
  const podiumOrder = [top3[1],top3[0],top3[2]].filter(Boolean);
  const pClass = ['p2','p1','p3'];
  const crowns = ['🥈','🏆','🥉'];

  render(`
    <div class="center" style="margin-bottom:1rem;">
      <h1 style="font-size:34px;letter-spacing:3px;">${t('matchOver')}</h1>
      <p class="muted">${t('winner')} <strong style="color:#f4c430;">${winner.name}</strong></p>
    </div>
    <div class="podium">
      ${podiumOrder.map((p,i)=>`
        <div class="podium-col">
          <div class="podium-crown">${crowns[i]}</div>
          <div class="podium-name">${p.name}${p.name===myName?` <span style="color:#86efac;font-size:11px;">${t('you')}</span>`:''}</div>
          <div class="podium-score">${p.score.toLocaleString()} pts</div>
          <div class="podium-block ${pClass[i]}">${pClass[i]==='p1'?'1':pClass[i]==='p2'?'2':'3'}</div>
        </div>`).join('')}
    </div>
    ${rest.length?`<div style="max-width:400px;margin:0 auto 1.4rem;">${rest.map((p,i)=>`<div class="leaderboard-row"><span class="rank" style="color:#475569;">${i+4}.</span><span style="flex:1;">${p.name}${p.name===myName?` <span style="color:#86efac;font-size:11px;">${t('you')}</span>`:''}</span><span style="font-weight:600;color:#86efac;">${p.score.toLocaleString()}</span></div>`).join('')}</div>`:''}
    <div class="btn-row" style="margin-bottom:8px;">
      ${isHost
        ? `<button id="rematch-btn" class="btn-primary">${t('rematch')}</button>`
        : `<p class="muted center" style="flex:1;">${t('waitRematch')}</p>`}
      <button id="home-btn">${t('goHome')}</button>
    </div>
    <button id="history-btn" style="width:100%;font-size:13px;opacity:.8;">${t('pastGames')}</button>
  `);

  if (isHost) {
    document.getElementById('rematch-btn').onclick = () => {
      socket.emit('rematch', res => { if (!res?.ok) alert(res?.error||'Hata'); });
    };
  }
  document.getElementById('home-btn').onclick = () => { socket?.disconnect(); location.reload(); };
  document.getElementById('history-btn').onclick = renderPastGames;

  setTimeout(launchConfetti, 150);
}

// ── Past Games ────────────────────────────────────────────────────────────────
function renderPastGames() {
  _lastRender = renderPastGames;
  const history = JSON.parse(localStorage.getItem('footbally_history')||'[]');
  const modeLabel = m => ({ quickfire:t('historyModeQF'),career:t('historyModeCP'),squad:t('historyModeSQ'),higherlower:t('historyModeHL') }[m]||m);
  const rankEmoji = r => r===1?'🥇':r===2?'🥈':r===3?'🥉':'#'+r;

  render(`
    <h1 class="vt" style="font-size:28px;letter-spacing:3px;margin-bottom:1rem;">${t('historyTitle')}</h1>
    ${history.length===0 ? `<p class="muted center" style="padding:2rem;">${t('historyEmpty')}</p>` :
      history.map(m=>`
        <div class="history-row">
          <div class="history-rank">${m.myRank?rankEmoji(m.myRank):'—'}</div>
          <div class="history-meta">
            <strong>${modeLabel(m.mode)}</strong> · ${m.questionCount}Q · ${t('diff'+((m.difficulty||'normal').charAt(0).toUpperCase()+(m.difficulty||'normal').slice(1)))}<br>
            <span style="color:#64748b;font-size:11px;">${new Date(m.date).toLocaleDateString(lang==='tr'?'tr-TR':'en-GB',{day:'numeric',month:'short',year:'numeric'})}</span>
            · ${(m.players||[]).length} ${t('players').toLowerCase()}
          </div>
          <div class="history-score">${(m.myScore||0).toLocaleString()}</div>
        </div>`).join('')}
    <div class="btn-row" style="margin-top:1rem;">
      <button id="hist-back">${t('historyBack')}</button>
      ${history.length?`<button id="hist-export">${t('historyExport')}</button>`:''}
    </div>
  `);

  document.getElementById('hist-back').onclick = () => { if (_lastRender===renderPastGames) renderHome(); };
  const expBtn = document.getElementById('hist-export');
  if (expBtn) expBtn.onclick = () => {
    const blob = new Blob([JSON.stringify(history,null,2)],{type:'application/json'});
    const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'footbally_history.json'});
    a.click();
  };
}

// ── Socket handlers ───────────────────────────────────────────────────────────
function setupSocketHandlers() {
  socket.on('connect',    () => setConnected(true));
  socket.on('disconnect', () => {
    setConnected(false);
    if (!isSolo) { alert(t('disconnectedAlert')); location.reload(); }
  });

  socket.on('lobby_update', ({ players, settings }) => {
    if (settings) roomSettings = settings;
    if (isSolo) return;
    renderLobby(players);
  });

  socket.on('game_started', ({ mode, settings }) => {
    if (settings) roomSettings = settings;
    _lastRender = null;
    _hlDone = false; _hlStreak = 0; _hlMult = 1; _hlScore = 0; _hlPos = 1;
    root.innerHTML = `<div class="center" style="padding:3rem;"><div style="font-size:48px;margin-bottom:1rem;">⚽</div><h2>${t('gameStarting')}</h2></div>`;
  });

  socket.on('question', data => {
    // Store real club names for career reveal
    if (data.careerSteps && data.hints) {
      window._currentCareerData = data;
    }
    renderQuestion(data);
  });

  socket.on('reveal',     renderReveal);
  socket.on('answer_ack', handleAnswerAck);
  socket.on('game_over',  renderGameOver);

  socket.on('career_hint', ({ hint, hintsLeft }) => {
    // The last submitted answer was wrong — mark it
    if (_lastCareerAnswer && !_careerWrongAnswers.includes(_lastCareerAnswer)) {
      _careerWrongAnswers.push(_lastCareerAnswer);
    }
    _lastCareerAnswer = null;
    _careerGuessesLeft = hintsLeft;
    if (hint) {
      const idx = [0,1,2,3].find(i => !_careerRevealedHints[i]);
      if (idx !== undefined) _careerRevealedHints[idx] = hint;
    }
    if (window._refreshCareerUI) window._refreshCareerUI();
    // Set feedback after refresh (refresh replaces the div)
    const fb = document.getElementById('feedback');
    if (fb) fb.innerHTML = `<span style="color:#f87171;">✗ ${t('answerWrong')} — ${hintsLeft} ${t('careerHintsLeft')}</span>`;
  });

  socket.on('hl_start', ({ players, firstRevealedValue, firstLeft, firstRight }) => {
    _hlChain     = players;
    _hlLeft      = firstLeft;
    _hlRight     = firstRight;
    _hlLeftValue = firstRevealedValue;
    _hlStreak    = 0; _hlMult = 1; _hlScore = 0; _hlDone = false; _hlPos = 1;
    renderHLScreen();
  });

  socket.on('hl_result', handleHLResult);

  socket.on('rematch_ready', () => {
    // Server triggers game_started for rematch, handled above
  });
}

renderHome();
</script>
