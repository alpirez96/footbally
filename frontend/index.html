<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footbally — Multiplayer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 1.5rem 1rem 3rem;
  background-color: #0e6630;
  background-image: repeating-linear-gradient(
    180deg, transparent, transparent 48px,
    rgba(0,0,0,0.07) 48px, rgba(0,0,0,0.07) 96px
  );
  color: #f1f5f9;
}
/* Saha arka plan SVG */
.pitch-bg {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.pitch-bg svg { width: min(95vw, 780px); opacity: 0.12; }
/* Container */
.container {
  position: relative; z-index: 1;
  width: 100%; max-width: 700px;
  background: #083d1f;
  border-radius: 18px;
  padding: 1.4rem 1.8rem 2rem;
  border: 2px solid rgba(255,255,255,0.2);
  box-shadow: 0 12px 50px rgba(0,0,0,0.55);
}
/* Tipografi */
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px; letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 6px; line-height: 1.1;
}
h2 { font-size: 19px; font-weight: 500; line-height: 1.4; }
.muted  { color: #86efac; font-size: 14px; }
.center { text-align: center; }
/* Input / button */
input, button {
  font-family: inherit; font-size: 15px;
  padding: 11px 16px;
  border: 1px solid rgba(255,255,255,0.18);
  background: #0a5c2e; color: #f1f5f9;
  border-radius: 10px;
}
input { width: 100%; margin-bottom: 12px; }
input:focus { outline: none; border-color: #f4c430; }
input::placeholder { color: #86efac; }
button {
  font-weight: 600; cursor: pointer;
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
}
button:hover:not(:disabled) { background: #0f6b35; box-shadow: 0 0 12px rgba(244,196,48,0.2); }
button:active:not(:disabled) { transform: translateY(1px); }
button:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-primary { background: #f4c430; border-color: #f4c430; color: #083d1f; }
.btn-primary:hover:not(:disabled) { background: #f0b800 !important; box-shadow: 0 0 18px rgba(244,196,48,0.45) !important; }
.btn-row { display: flex; gap: 10px; }
.btn-row button { flex: 1; }
/* Top bar */
.top-bar {
  display: flex; justify-content: flex-end; align-items: center;
  gap: 6px; margin-bottom: 1.4rem;
  font-size: 13px; color: #86efac;
}
.conn-indicator { display: flex; align-items: center; gap: 5px; }
.conn-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; flex-shrink: 0; transition: background 0.3s; }
.conn-dot.off { background: #dc2626; }
.top-sep { color: rgba(255,255,255,0.2); margin: 0 2px; }
.lang-btn {
  background: none !important; border: none; padding: 2px 5px;
  color: #86efac; font-size: 13px; cursor: pointer;
  font-family: inherit; font-weight: 400; border-radius: 4px; transition: color 0.15s;
}
.lang-btn:hover:not(:disabled) { background: none !important; color: #f1f5f9; box-shadow: none !important; }
.lang-btn.active { color: #f4c430; font-weight: 700; }
/* Mode pill (lobi) */
.mode-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; padding: 3px 10px;
  border-radius: 20px; margin-bottom: 10px;
  background: rgba(244,196,48,0.12); border: 1px solid rgba(244,196,48,0.3); color: #f4c430;
}
.mode-pill.hard  { background: rgba(220,38,38,0.12);  border-color: rgba(220,38,38,0.3);  color: #fca5a5; }
.mode-pill.blitz { background: rgba(234,179,8,0.15);  border-color: rgba(234,179,8,0.4);  color: #fde68a; }
/* Lobby player */
.lobby-player {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; background: rgba(0,0,0,0.22);
  border-radius: 8px; margin-bottom: 8px;
  border: 1px solid rgba(255,255,255,0.07);
}
.badge-host {
  background: #f4c430; color: #083d1f;
  font-size: 10px; padding: 2px 8px;
  border-radius: 10px; font-weight: 700; letter-spacing: 1px;
}
/* Code display */
.code-display {
  font-family: ui-monospace, monospace;
  font-size: 30px; font-weight: 700; letter-spacing: 6px;
  background: rgba(0,0,0,0.3); padding: 14px; border-radius: 10px;
  margin: .8rem 0; text-align: center;
  border: 1px solid rgba(255,255,255,0.1); color: #f4c430;
}
/* Header row */
.header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
/* Timer */
.timer-bar-wrap { height: 6px; background: rgba(0,0,0,0.35); border-radius: 3px; margin-bottom: 1.8rem; overflow: hidden; }
.timer-bar { height: 100%; background: #f4c430; transition: width 0.1s linear; }
/* Options */
.options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px,1fr)); gap: 10px; }
.opt-btn {
  padding: 13px 15px; text-align: left;
  display: flex; align-items: center; gap: 12px;
  background: #0a5c2e;
}
.opt-btn.correct { background: #065f46 !important; border-color: #10b981 !important; animation: correct-flash 0.35s ease-out; }
.opt-btn.wrong   { background: #7f1d1d !important; border-color: #dc2626 !important; animation: wrong-flash  0.25s ease-out; }
.opt-letter {
  width: 26px; height: 26px; border-radius: 50%;
  background: rgba(0,0,0,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0; color: #f4c430;
}
/* Leaderboard */
.leaderboard-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; background: rgba(0,0,0,0.22);
  border-radius: 8px; margin-bottom: 6px;
  border: 1px solid rgba(255,255,255,0.06);
}
.rank { width: 24px; text-align: center; font-weight: 700; color: #86efac; }
/* Podium */
.podium { display: flex; align-items: flex-end; justify-content: center; gap: 6px; margin: 1.4rem 0; }
.podium-col { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 160px; }
.podium-block {
  width: 100%; border-radius: 8px 8px 0 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: rgba(0,0,0,0.4);
}
.podium-block.p1 { height: 100px; background: linear-gradient(180deg,#f4c430,#d4a017); }
.podium-block.p2 { height: 72px;  background: linear-gradient(180deg,#cbd5e1,#94a3b8); }
.podium-block.p3 { height: 52px;  background: linear-gradient(180deg,#cd7f32,#9a5f22); }
.podium-name  { font-weight: 700; font-size: 13px; text-align: center; margin-bottom: 4px; }
.podium-score { font-size: 12px; color: #86efac; margin-bottom: 6px; }
.podium-crown { font-size: 22px; margin-bottom: 4px; }
/* Mode select grid */
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
@media (max-width: 420px) { .mode-grid { grid-template-columns: 1fr; } }
.mode-card {
  display: flex; flex-direction: column; gap: 5px;
  padding: 16px; border-radius: 12px;
  background: #0a5c2e; border: 2px solid rgba(255,255,255,0.1);
  cursor: pointer; transition: border-color 0.18s, box-shadow 0.18s, transform 0.1s;
  text-align: left; width: 100%;
}
.mode-card:hover { border-color: #f4c430; box-shadow: 0 0 18px rgba(244,196,48,0.2); }
.mode-card:active { transform: translateY(1px); }
.mode-card.tr-card:hover   { border-color: #dc2626; box-shadow: 0 0 18px rgba(220,38,38,0.2); }
.mode-card.hard-card:hover { border-color: #f97316; box-shadow: 0 0 18px rgba(249,115,22,0.2); }
.mode-card.blitz-card:hover{ border-color: #eab308; box-shadow: 0 0 18px rgba(234,179,8,0.2); }
.mode-icon  { font-size: 26px; margin-bottom: 2px; }
.mode-card-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; line-height: 1.1; }
.mode-card-sub   { font-size: 12px; color: #86efac; line-height: 1.3; }
.tag {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 8px; margin-top: 4px;
}
.tag-red    { background: #dc2626; color: #fff; }
.tag-orange { background: #f97316; color: #fff; }
.tag-yellow { background: #eab308; color: #083d1f; }
/* Warning */
.warning-box { background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #fca5a5; margin-top: 1rem; }
.info-box    { background: rgba(234,179,8,0.1);  border: 1px solid rgba(234,179,8,0.3);  border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #fde68a; margin-top: 1rem; }
/* Error */
.error { color: #fca5a5; font-size: 13px; margin-top: 8px; text-align: center; }
/* Score flash */
.score-flash { font-size: 18px; font-weight: 700; animation: score-pop 0.5s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes score-pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
/* Animations */
@keyframes correct-flash {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.025); box-shadow: 0 0 20px rgba(16,185,129,0.5); }
  100% { transform: scale(1); }
}
@keyframes wrong-flash {
  0%   { transform: scale(1); }
  25%  { transform: scale(0.97) translateX(-3px); }
  60%  { transform: scale(0.97) translateX(3px); }
  100% { transform: scale(1); }
}
@keyframes ball-in {
  from { transform: translateX(-24px) scale(0.4); opacity: 0; }
  to   { transform: translateX(0) scale(1); opacity: 1; }
}
.ball-anim { display: inline-block; animation: ball-in 0.3s cubic-bezier(.34,1.56,.64,1); }
@keyframes confetti-fall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(540deg); opacity: 0; }
}
/* Responsive */
@media (max-width: 480px) {
  .container { padding: 1.1rem 1rem 1.5rem; }
  h1 { font-size: 30px; }
  .code-display { font-size: 24px; letter-spacing: 4px; }
  .options-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const BACKEND_URL = 'https://footbally-a7js.onrender.com';

// Render'ı sayfa açılışında uyandır (soğuk başlatma sorunu)
fetch(BACKEND_URL + '/').catch(() => {});

// ── i18n ─────────────────────────────────────────────────────────────────────
const i18n = {

    namePlaceholder: 'Adın',

    lobbyTitle:      'Lobi',

    needMorePlayers: 'En az 2 oyuncu gerek',

    // oyun
    question:        'Soru',

    answerSubmitted: 'Cevap gönderildi, diğerleri bekleniyor...',

    answerWrong:     'Yanlış...',

    // oyun sonu
    matchOver:       'MAÇ SONA ERDİ',
    winner:          'Kazanan:',
    you:             '(sen)',
    newGame:         'Yeni oyun',
    gameStarting:    'Oyun başlıyor...',
    // bağlantı
    connected:       'Bağlı',
    disconnected:    'Bağlantı koptu',
    disconnectedAlert:'Sunucuyla bağlantı koptu',
  },
  en: {
    subtitle:        'Multiplayer football trivia',
    namePlaceholder: 'Your name',
    createRoom:      'Create room',
    joinRoom:        'Join room',
    enterName:       'Please enter your name',
    selectMode:      'Select Mode',
    selectModeSub:   'What kind of trivia do you want?',
    modeEuropeTitle: 'European Football',
    modeEuropeSub:   'Big-5 leagues & global stars',
    modeTurkeyTitle: 'Türkiye Süper Lig',
    modeTurkeySub:   'Only Süper Lig players',
    modeHardTitle:   'Hard Mode',
    modeHardSub:     'Career paths, exceptions, tough questions',
    modeBlitzTitle:  'Blitz',
    modeBlitzSub:    '5 seconds. Don\'t think, feel!',
    modeTurkeyBadge: 'Hard 🔥',
    modeHardBadge:   'Very Hard',
    modeBlitzBadge:  'Fast ⚡',
    modeEuropeLabel: '🌍 Europe',
    modeTurkeyLabel: '🇹🇷 Türkiye',
    modeHardLabel:   '🔥 Hard Mode',
    modeBlitzLabel:  '⚡ Blitz',
    joinFormTitle:   'Join a room',
    joinFormSub:     'Get the 6-character code from your friend',
    codePlaceholder: 'Room code (e.g. ABC123)',

    join:            'Join',
    invalidCode:     'Enter a valid code',
    connError:       'Could not connect to server',

    lobbyTitle:      'Lobby',
    shareCode:       'Room code — share with your friends:',
    players:         'Players',
    needMorePlayers: 'Need at least 2 players',
    startGame:       'Start game',
    waitingHost:     'Waiting for host to start...',
    changeModeBack:  'Change mode',
    turkeyWarning:   'This mode is harder — make sure you know your Süper Lig!',
    blitzInfo:       '⚡ Only 5 seconds per question!',
    hardInfo:        '🔥 Only hard questions ahead!',
    question:        'Question',
    code:            'Code',
    answerSubmitted: 'Answer submitted, waiting for others...',
    answerCorrect:   'Correct!',
    answerWrong:     'Wrong...',
    correctAnswer:   'Correct answer:',
    matchOver:       'MATCH OVER',
    winner:          'Winner:',
    you:             '(you)',
    newGame:         'New game',
    gameStarting:    'Game starting...',
    connected:       'Connected',
    disconnected:    'Disconnected',
    disconnectedAlert:'Connection to server lost',
  },
};

let lang = navigator.language.startsWith('tr') ? 'tr' : 'en';
function t(k) { return i18n[lang][k] || i18n.tr[k] || k; }

document.getElementById('btn-tr').classList.toggle('active', lang === 'tr');
document.getElementById('btn-en').classList.toggle('active', lang === 'en');
document.documentElement.lang = lang;

let _lastRender = null;

function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.getElementById('btn-tr').classList.toggle('active', l === 'tr');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  const ct = document.getElementById('conn-text');
  if (ct && ct.textContent) ct.textContent = _socketConnected ? t('connected') : t('disconnected');
  if (_lastRender) _lastRender();
}

// ── Bağlantı durumu ───────────────────────────────────────────────────────────
let _socketConnected = false;
function setConnected(v) {
  _socketConnected = v;
  document.getElementById('conn-indicator').style.display = '';
  document.getElementById('conn-sep').style.display = '';
  document.getElementById('conn-dot').classList.toggle('off', !v);
  document.getElementById('conn-text').textContent = v ? t('connected') : t('disconnected');
}

// ── Durum ─────────────────────────────────────────────────────────────────────
const root = document.getElementById('root');
let socket       = null;
let myName       = '';
let isHost       = false;
let currentCode  = '';
let selectedMode = 'europe';
let roomMode     = 'europe';
let myScore      = 0;

function render(html) { root.innerHTML = html; }

// ── SVG helpers ───────────────────────────────────────────────────────────────
const JERSEY_COLORS = ['#e63946','#2196f3','#ff9800','#9c27b0','#00bcd4'];
function jerseyIcon(idx) {
  const c = JERSEY_COLORS[idx % JERSEY_COLORS.length];
  return `<svg width="22" height="22" viewBox="0 0 22 22">
    <path d="M3 7L7 3H9.5C9.5 4.3 10.1 5 11 5S12.5 4.3 12.5 3H15L19 7L16 10V21H6V10Z"
      fill="${c}" stroke="rgba(255,255,255,0.3)" stroke-width="0.7"/>
  </svg>`;
}
function medalIcon(rank) {
  const c = {1:'#f4c430',2:'#cbd5e1',3:'#cd7f32'}[rank] || '#86efac';
  return `<svg width="20" height="20" viewBox="0 0 20 20">
    <circle cx="10" cy="10" r="9" fill="${c}" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    <text x="10" y="14" text-anchor="middle" font-size="10" font-weight="bold" fill="#083d1f">${rank}</text>
  </svg>`;
}

// ── Mod yardımcıları ──────────────────────────────────────────────────────────
function modePillClass(mode) {
  return { turkey: 'hard', hard: 'hard', blitz: 'blitz' }[mode] || '';
}
function modePillLabel(mode) {
  return t({ europe: 'modeEuropeLabel', turkey: 'modeTurkeyLabel', hard: 'modeHardLabel', blitz: 'modeBlitzLabel' }[mode] || 'modeEuropeLabel');
}

// ── Confetti ──────────────────────────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#f4c430','#10b981','#3b82f6','#dc2626','#a855f7','#fb923c'];
  for (let i = 0; i < 55; i++) {
    const el = document.createElement('div');
    const size = 6 + Math.random() * 7;
    el.style.cssText = [
      'position:fixed', `top:-${size}px`,
      `left:${Math.random()*100}vw`,
      `width:${size}px`, `height:${size}px`,
      `background:${colors[i % colors.length]}`,
      `border-radius:${Math.random()>.5?'50%':'3px'}`,
      `animation:confetti-fall ${0.8+Math.random()*1.1}s ${Math.random()*0.5}s linear forwards`,
      'pointer-events:none', 'z-index:9999',
    ].join(';');
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
  }
}

// ── Ana ekran ─────────────────────────────────────────────────────────────────
function renderHome() {
  _lastRender = renderHome;
  render(`
    <div class="center" style="padding:2rem 1rem;">
      <div style="font-size:58px;line-height:1;margin-bottom:8px;">⚽</div>
      <h1>Footbally</h1>
      <p class="muted" style="margin-bottom:2rem;">${t('subtitle')}</p>
      <div style="max-width:320px;margin:0 auto;">
        <input id="name-input" placeholder="${t('namePlaceholder')}" maxlength="16"/>
        <div class="btn-row">
          <button id="create-btn" class="btn-primary">${t('createRoom')}</button>
          <button id="join-btn">${t('joinRoom')}</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('create-btn').onclick = () => {
    const name = document.getElementById('name-input').value.trim();
    if (!name) return alert(t('enterName'));
    myName = name; renderModeSelect();
  };
  document.getElementById('join-btn').onclick = () => {
    const name = document.getElementById('name-input').value.trim();
    if (!name) return alert(t('enterName'));
    myName = name; renderJoinForm();
  };
}

// ── Mod seçim ─────────────────────────────────────────────────────────────────
function renderModeSelect() {
  _lastRender = renderModeSelect;
  render(`
    <h1>${t('selectMode')}</h1>
    <p class="muted" style="margin-bottom:1.2rem;">${t('selectModeSub')}</p>
    <div class="mode-grid">
      <button class="mode-card" id="m-europe">
        <div class="mode-icon">🌍</div>
        <div class="mode-card-title">${t('modeEuropeTitle')}</div>
        <div class="mode-card-sub">${t('modeEuropeSub')}</div>
      </button>
      <button class="mode-card tr-card" id="m-turkey">
        <div class="mode-icon">🇹🇷</div>
        <div class="mode-card-title">${t('modeTurkeyTitle')}</div>
        <div class="mode-card-sub">${t('modeTurkeySub')}</div>
        <span class="tag tag-red">${t('modeTurkeyBadge')}</span>
      </button>
      <button class="mode-card hard-card" id="m-hard">
        <div class="mode-icon">🔥</div>
        <div class="mode-card-title">${t('modeHardTitle')}</div>
        <div class="mode-card-sub">${t('modeHardSub')}</div>
        <span class="tag tag-orange">${t('modeHardBadge')}</span>
      </button>
      <button class="mode-card blitz-card" id="m-blitz">
        <div class="mode-icon">⚡</div>
        <div class="mode-card-title">${t('modeBlitzTitle')}</div>
        <div class="mode-card-sub">${t('modeBlitzSub')}</div>
        <span class="tag tag-yellow">${t('modeBlitzBadge')}</span>
      </button>
    </div>
    <button id="back-btn" style="width:100%;">${t('back')}</button>
    <div id="create-error" class="error" style="display:none;margin-top:10px;"></div>
    <div id="create-loading" style="display:none;margin-top:10px;text-align:center;color:#86efac;font-size:14px;"></div>
  `);
  ['europe','turkey','hard','blitz'].forEach(mode => {
    document.getElementById('m-' + mode).onclick = () => startCreate(mode);
  });
  document.getElementById('back-btn').onclick = renderHome;
}

async function startCreate(mode) {
  selectedMode = mode;
  const errEl  = document.getElementById('create-error');
  const loadEl = document.getElementById('create-loading');
  if (!errEl) return; // güvenlik
  errEl.style.display  = 'none';
  loadEl.style.display = '';
  loadEl.textContent   = t('connWaking');
  // Tüm kartları disable et
  document.querySelectorAll('.mode-card').forEach(b => b.disabled = true);
  try {
    const res = await fetch(`${BACKEND_URL}/create-room`, { method: 'POST' });
    const { code } = await res.json();
    loadEl.style.display = 'none';
    joinRoom(code);
  } catch (err) {
    loadEl.style.display = 'none';
    document.querySelectorAll('.mode-card').forEach(b => b.disabled = false);
    errEl.style.display = '';
    errEl.innerHTML = `${t('connError')} — <button onclick="startCreate('${mode}')" style="background:none;border:none;color:#f4c430;cursor:pointer;font-size:13px;padding:0;font-weight:600;">${t('connRetry')}</button>`;
  }
}

// ── Odaya katıl formu ─────────────────────────────────────────────────────────
function renderJoinForm() {
  _lastRender = renderJoinForm;
  render(`
    <div class="center" style="padding:2rem 1rem;">
      <h1>${t('joinFormTitle')}</h1>
      <p class="muted" style="margin-bottom:2rem;">${t('joinFormSub')}</p>
      <div style="max-width:320px;margin:0 auto;">
        <input id="code-input" placeholder="${t('codePlaceholder')}" maxlength="6"
          style="text-transform:uppercase;text-align:center;letter-spacing:3px;"/>
        <div class="btn-row">
          <button id="back-btn">${t('back')}</button>
          <button id="join-btn" class="btn-primary">${t('join')}</button>
        </div>
        <div id="error" class="error"></div>
      </div>
    </div>
  `);
  document.getElementById('back-btn').onclick = renderHome;
  document.getElementById('join-btn').onclick = () => {
    const code = document.getElementById('code-input').value.trim().toUpperCase();
    if (code.length !== 6) { document.getElementById('error').textContent = t('invalidCode'); return; }
    joinRoom(code);
  };
}

function joinRoom(code) {
  currentCode = code; myScore = 0;
  if (!socket) { socket = io(BACKEND_URL); setupSocketHandlers(); }
  socket.emit('join_room', { code, name: myName }, (res) => {
    if (!res.ok) {
      const el = document.getElementById('error');
      if (el) el.textContent = res.error;
      return;
    }
    isHost = res.isHost;
    if (isHost) {
      roomMode = selectedMode;
      socket.emit('set_mode', { mode: selectedMode });
    }
    renderLobby([]);
  });
}

// ── Lobi ──────────────────────────────────────────────────────────────────────
function renderLobby(players) {
  _lastRender = () => renderLobby(players);
  const isTurkey = roomMode === 'turkey';
  const isBlitz  = roomMode === 'blitz';
  const isHard   = roomMode === 'hard';

  render(`
    <h1>${t('lobbyTitle')}</h1>
    <div class="mode-pill ${modePillClass(roomMode)}">${modePillLabel(roomMode)}</div>
    <p class="muted">${t('shareCode')}</p>
    <div class="code-display">${currentCode}</div>
    <h2 style="margin-bottom:12px;">${t('players')} (${players.length}/5)</h2>
    <div id="player-list">
      ${players.map((p, i) => `
        <div class="lobby-player">
          ${jerseyIcon(i)}
          <span style="flex:1;">${p}</span>
          ${i === 0 ? '<span class="badge-host">©</span>' : ''}
        </div>
      `).join('')}
    </div>
    ${isHost ? `
      <button id="start-btn" class="btn-primary" style="width:100%;margin-top:1.4rem;"
        ${players.length < 2 ? 'disabled' : ''}>
        ${players.length < 2 ? t('needMorePlayers') : t('startGame')}
      </button>
      <button id="change-mode-btn" style="width:100%;margin-top:8px;font-size:13px;opacity:0.7;">
        ${t('changeModeBack')}
      </button>
    ` : `<p class="muted center" style="margin-top:1.4rem;">${t('waitingHost')}</p>`}
    ${isTurkey ? `<div class="warning-box">⚠️ ${t('turkeyWarning')}</div>` : ''}
    ${isBlitz  ? `<div class="info-box">${t('blitzInfo')}</div>`   : ''}
    ${isHard   ? `<div class="info-box">${t('hardInfo')}</div>`    : ''}
  `);

  if (isHost) {
    document.getElementById('start-btn').onclick = () => {
      socket.emit('start_game', { mode: roomMode }, (res) => {
        if (!res.ok) alert(res.error);
      });
    };
    document.getElementById('change-mode-btn').onclick = () => {
      // Soket bağlı kalır ama mod seçimine döner; oda hâlâ açık
      renderModeSelect();
    };
  }
}

// ── Soru ekranı ───────────────────────────────────────────────────────────────
let qStartTs = 0, timerRaf = null, answered = false;

function renderQuestion({ index, total, questionTR, questionEN, subTR, subEN, options, durationMs }) {
  qStartTs = Date.now(); answered = false;
  if (timerRaf) cancelAnimationFrame(timerRaf);

  const question = lang === 'en' ? (questionEN || questionTR) : questionTR;
  const sub      = lang === 'en' ? (subEN || subTR) : subTR;

  render(`
    <div class="header-row">
      <span class="muted">${t('question')} ${index + 1} / ${total}</span>
      <span style="font-size:13px;color:#86efac;">${t('code')}: ${currentCode}</span>
    </div>
    <div class="timer-bar-wrap"><div id="timer-bar" class="timer-bar" style="width:100%"></div></div>
    <div class="center" style="margin-bottom:1.8rem;min-height:76px;">
      <h2>${question}</h2>
      ${sub ? `<p class="muted" style="margin-top:8px;">${sub}</p>` : ''}
    </div>
    <div class="options-grid">
      ${options.map((opt, i) => `
        <button class="opt-btn" data-opt="${encodeURIComponent(opt)}">
          <span class="opt-letter">${String.fromCharCode(65+i)}</span>
          <span>${opt}</span>
        </button>
      `).join('')}
    </div>
    <div id="feedback" class="center muted" style="margin-top:1.4rem;min-height:24px;"></div>
  `);

  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.onclick = () => {
      if (answered) return;
      answered = true;
      const opt = decodeURIComponent(btn.dataset.opt);
      socket.emit('submit_answer', { answer: opt });
      document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
      btn.style.borderColor = '#f4c430';
      document.getElementById('feedback').textContent = t('answerSubmitted');
    };
  });

  const bar  = document.getElementById('timer-bar');
  const tick = () => {
    const elapsed   = Date.now() - qStartTs;
    const remaining = Math.max(0, durationMs - elapsed);
    bar.style.width = (remaining / durationMs * 100) + '%';
    if      (remaining > durationMs * 0.5)  bar.style.background = '#f4c430';
    else if (remaining > durationMs * 0.25) bar.style.background = '#f59e0b';
    else                                    bar.style.background = '#dc2626';
    if (remaining > 0) timerRaf = requestAnimationFrame(tick);
  };
  timerRaf = requestAnimationFrame(tick);
}

// ── answer_ack: puan göster ───────────────────────────────────────────────────
function handleAnswerAck({ correct, gained }) {
  myScore += gained;
  const fb = document.getElementById('feedback');
  if (!fb) return;
  if (correct) {
    fb.innerHTML = `<span class="score-flash" style="color:#4ade80;">✓ ${t('answerCorrect')}</span> <span class="score-flash" style="color:#f4c430;">+${gained.toLocaleString()}</span>`;
  } else {
    fb.innerHTML = `<span class="score-flash" style="color:#f87171;">✗ ${t('answerWrong')}</span>`;
  }
}

// ── Cevap açıklama ────────────────────────────────────────────────────────────
function renderReveal({ correct, leaderboard }) {
  cancelAnimationFrame(timerRaf);
  document.querySelectorAll('.opt-btn').forEach(btn => {
    const opt = decodeURIComponent(btn.dataset.opt);
    btn.disabled = true;
    if (opt === correct) btn.classList.add('correct');
    else btn.style.opacity = '0.35';
  });
  document.getElementById('feedback').innerHTML = `
    <div style="margin-bottom:10px;">
      <span class="ball-anim">⚽</span>
      ${t('correctAnswer')} <strong style="color:#f4c430;">${correct}</strong>
    </div>
    <div style="text-align:left;max-width:360px;margin:0 auto;">
      ${leaderboard.slice(0, 5).map((p, i) => `
        <div class="leaderboard-row">
          <span class="rank">${medalIcon(i+1)}</span>
          <span style="flex:1;">${p.name}</span>
          <span style="font-weight:600;color:#f4c430;">${p.score.toLocaleString()}</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ── Oyun sonu ─────────────────────────────────────────────────────────────────
function renderGameOver({ leaderboard }) {
  _lastRender = () => renderGameOver({ leaderboard });
  const top3   = leaderboard.slice(0, 3);
  const rest   = leaderboard.slice(3);
  const winner = leaderboard[0];
  // podium düzeni: 2. sol — 1. orta — 3. sağ
  const podiumOrder = [top3[1], top3[0], top3[2]].filter(Boolean);
  const pClass  = ['p2','p1','p3'];
  const crowns  = ['🥈','🏆','🥉'];

  render(`
    <div class="center" style="margin-bottom:1rem;">
      <h1 style="font-size:34px;letter-spacing:3px;">${t('matchOver')}</h1>
      <p class="muted">${t('winner')} <strong style="color:#f4c430;">${winner.name}</strong></p>
    </div>
    <div class="podium">
      ${podiumOrder.map((p, i) => `
        <div class="podium-col">
          <div class="podium-crown">${crowns[i]}</div>
          <div class="podium-name">${p.name}${p.name===myName?` <span style="color:#86efac;font-size:11px;">${t('you')}</span>`:''}</div>
          <div class="podium-score">${p.score.toLocaleString()} pts</div>
          <div class="podium-block ${pClass[i]}">${pClass[i]==='p1'?'1':pClass[i]==='p2'?'2':'3'}</div>
        </div>
      `).join('')}
    </div>
    ${rest.length ? `
      <div style="max-width:400px;margin:0 auto 1.4rem;">
        ${rest.map((p,i) => `
          <div class="leaderboard-row">
            <span class="rank" style="color:#475569;">${i+4}.</span>
            <span style="flex:1;">${p.name}${p.name===myName?` <span style="color:#86efac;font-size:11px;">${t('you')}</span>`:''}</span>
            <span style="font-weight:600;color:#86efac;">${p.score.toLocaleString()}</span>
          </div>
        `).join('')}
      </div>
    ` : ''}
    <button class="btn-primary" style="width:100%;" onclick="location.reload()">
      ${t('newGame')}
    </button>
  `);

  setTimeout(launchConfetti, 150);
}

// ── Socket handlers ───────────────────────────────────────────────────────────
function setupSocketHandlers() {
  socket.on('connect',    () => setConnected(true));
  socket.on('lobby_update', ({ players, mode }) => {
    if (mode !== undefined) roomMode = mode;
    renderLobby(players);
  });
  socket.on('game_started', () => {
    _lastRender = null;
    root.innerHTML = `<div class="center" style="padding:3rem;">
      <div style="font-size:48px;margin-bottom:1rem;">⚽</div>
      <h2>${t('gameStarting')}</h2>
    </div>`;
  });
  socket.on('question',   renderQuestion);
  socket.on('reveal',     renderReveal);
  socket.on('answer_ack', handleAnswerAck);
  socket.on('game_over',  renderGameOver);
  socket.on('disconnect', () => {
    setConnected(false);
    alert(t('disconnectedAlert'));
    location.reload();
  });
}

renderHome();
</script>
