<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footbally — Multiplayer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container {
    width: 100%;
    max-width: 720px;
    background: #1e293b;
    border-radius: 16px;
    padding: 2rem;
    border: 1px solid #334155;
  }
  h1 { font-size: 32px; font-weight: 600; margin-bottom: 8px; }
  h2 { font-size: 20px; font-weight: 500; line-height: 1.4; }
  .muted { color: #94a3b8; font-size: 14px; }
  .center { text-align: center; }
  input, button {
    font-family: inherit;
    font-size: 15px;
    padding: 12px 16px;
    border: 1px solid #475569;
    background: #334155;
    color: #f1f5f9;
    border-radius: 8px;
  }
  input { width: 100%; margin-bottom: 12px; }
  input:focus { outline: none; border-color: #3b82f6; }
  button {
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover:not(:disabled) { background: #475569; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: #3b82f6; border-color: #3b82f6; }
  .btn-primary:hover:not(:disabled) { background: #2563eb !important; }
  .btn-row { display: flex; gap: 10px; }
  .btn-row button { flex: 1; }
  .lobby-player {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: #0f172a;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .lobby-player .badge {
    background: #3b82f6;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .code-display {
    font-family: ui-monospace, monospace;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 4px;
    background: #0f172a;
    padding: 16px;
    border-radius: 8px;
    margin: 1rem 0;
    text-align: center;
  }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .timer-bar-wrap {
    height: 8px;
    background: #0f172a;
    border-radius: 4px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .timer-bar { height: 100%; background: #3b82f6; transition: width 0.1s linear; }
  .options-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 10px;
  }
  .opt-btn {
    padding: 16px 18px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .opt-btn.correct { background: #065f46 !important; border-color: #10b981 !important; }
  .opt-btn.wrong { background: #7f1d1d !important; border-color: #ef4444 !important; }
  .opt-letter {
    width: 26px; height: 26px; border-radius: 50%;
    background: #0f172a;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500;
    flex-shrink: 0;
  }
  .leaderboard-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: #0f172a;
    border-radius: 8px;
    margin-bottom: 6px;
  }
  .rank { width: 24px; text-align: center; font-weight: 600; color: #94a3b8; }
  .rank.gold { color: #fbbf24; }
  .error { color: #ef4444; font-size: 13px; margin-top: 8px; text-align: center; }
</style>
</head>
<body>
<div class="container" id="root"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
// ⚠️ DEPLOY'DA BU URL'Yİ DEĞİŞTİR
const BACKEND_URL = 'https://footbally-a7js.onrender.com';

const root = document.getElementById('root');
let socket = null;
let myName = '';
let isHost = false;
let currentCode = '';

function render(html) { root.innerHTML = html; }

// ── Ekran: Ana ekran ──
function renderHome() {
  render(`
    <div class="center" style="padding: 2rem 1rem;">
      <div style="font-size: 56px;">⚽</div>
      <h1>Footbally</h1>
      <p class="muted" style="margin-bottom: 2rem;">Multiplayer futbol trivia</p>
      <div style="max-width: 320px; margin: 0 auto;">
        <input id="name-input" placeholder="Adın" maxlength="16" />
        <div class="btn-row">
          <button id="create-btn" class="btn-primary">Oda oluştur</button>
          <button id="join-btn">Odaya katıl</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('create-btn').onclick = () => {
    const name = document.getElementById('name-input').value.trim();
    if (!name) return alert('Ad girmen gerek');
    myName = name;
    createRoom();
  };
  document.getElementById('join-btn').onclick = () => {
    const name = document.getElementById('name-input').value.trim();
    if (!name) return alert('Ad girmen gerek');
    myName = name;
    renderJoinForm();
  };
}

function renderJoinForm() {
  render(`
    <div class="center" style="padding: 2rem 1rem;">
      <h1>Odaya katıl</h1>
      <p class="muted" style="margin-bottom: 2rem;">Arkadaşından 6 karakterlik kodu al</p>
      <div style="max-width: 320px; margin: 0 auto;">
        <input id="code-input" placeholder="Oda kodu (ör. ABC123)" maxlength="6" style="text-transform: uppercase; text-align: center; letter-spacing: 2px;" />
        <div class="btn-row">
          <button id="back-btn">Geri</button>
          <button id="join-btn" class="btn-primary">Katıl</button>
        </div>
        <div id="error" class="error"></div>
      </div>
    </div>
  `);
  document.getElementById('back-btn').onclick = renderHome;
  document.getElementById('join-btn').onclick = () => {
    const code = document.getElementById('code-input').value.trim().toUpperCase();
    if (code.length !== 6) {
      document.getElementById('error').textContent = 'Geçerli bir kod gir';
      return;
    }
    joinRoom(code);
  };
}

// ── Oda oluşturma ──
async function createRoom() {
  try {
    const res = await fetch(`${BACKEND_URL}/create-room`, { method: 'POST' });
    const { code } = await res.json();
    joinRoom(code);
  } catch (err) {
    alert('Sunucuya bağlanılamadı: ' + err.message);
  }
}

function joinRoom(code) {
  currentCode = code;
  if (!socket) {
    socket = io(BACKEND_URL);
    setupSocketHandlers();
  }
  socket.emit('join_room', { code, name: myName }, (res) => {
    if (!res.ok) {
      document.getElementById('error') && (document.getElementById('error').textContent = res.error);
      return;
    }
    isHost = res.isHost;
    renderLobby([]);
  });
}

// ── Lobi ──
function renderLobby(players) {
  render(`
    <h1>Lobi</h1>
    <p class="muted">Oda kodu — arkadaşlarınla paylaş:</p>
    <div class="code-display">${currentCode}</div>
    <h2 style="margin-bottom: 12px;">Oyuncular (${players.length}/5)</h2>
    <div id="player-list">
      ${players.map((p, i) => `
        <div class="lobby-player">
          <span>${p}</span>
          ${i === 0 ? '<span class="badge">HOST</span>' : ''}
        </div>
      `).join('')}
    </div>
    ${isHost ? `
      <button id="start-btn" class="btn-primary" style="width: 100%; margin-top: 1.5rem;" ${players.length < 2 ? 'disabled' : ''}>
        ${players.length < 2 ? 'En az 2 oyuncu gerek' : 'Oyunu başlat'}
      </button>
    ` : `
      <p class="muted center" style="margin-top: 1.5rem;">Host'un başlatmasını bekle...</p>
    `}
  `);
  if (isHost) {
    document.getElementById('start-btn').onclick = () => {
      socket.emit('start_game', {}, (res) => {
        if (!res.ok) alert(res.error);
      });
    };
  }
}

// ── Oyun ──
let qStartTs = 0;
let timerRaf = null;
let answered = false;

function renderQuestion({ index, total, question, sub, options, durationMs }) {
  qStartTs = Date.now();
  answered = false;
  render(`
    <div class="header-row">
      <span class="muted">Soru ${index + 1} / ${total}</span>
      <span style="font-size: 13px;">Kod: ${currentCode}</span>
    </div>
    <div class="timer-bar-wrap"><div id="timer-bar" class="timer-bar"></div></div>
    <div class="center" style="margin-bottom: 2rem; min-height: 80px;">
      <h2>${question}</h2>
      ${sub ? `<p class="muted" style="margin-top: 8px;">${sub}</p>` : ''}
    </div>
    <div class="options-grid">
      ${options.map((opt, i) => `
        <button class="opt-btn" data-opt="${encodeURIComponent(opt)}">
          <span class="opt-letter">${String.fromCharCode(65+i)}</span>
          <span>${opt}</span>
        </button>
      `).join('')}
    </div>
    <div id="feedback" class="center muted" style="margin-top: 1.5rem; min-height: 24px;"></div>
  `);
  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.onclick = () => {
      if (answered) return;
      answered = true;
      const opt = decodeURIComponent(btn.dataset.opt);
      socket.emit('submit_answer', { answer: opt });
      document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
      btn.style.borderColor = '#3b82f6';
      document.getElementById('feedback').textContent = 'Cevap gönderildi, diğerlerini bekliyor...';
    };
  });

  const bar = document.getElementById('timer-bar');
  const tick = () => {
    const elapsed = Date.now() - qStartTs;
    const remaining = Math.max(0, durationMs - elapsed);
    bar.style.width = (remaining / durationMs * 100) + '%';
    if (remaining > 5000) bar.style.background = '#3b82f6';
    else if (remaining > 2500) bar.style.background = '#f59e0b';
    else bar.style.background = '#ef4444';
    if (remaining > 0) timerRaf = requestAnimationFrame(tick);
  };
  timerRaf = requestAnimationFrame(tick);
}

function renderReveal({ correct, leaderboard }) {
  cancelAnimationFrame(timerRaf);
  document.querySelectorAll('.opt-btn').forEach(btn => {
    const opt = decodeURIComponent(btn.dataset.opt);
    btn.disabled = true;
    if (opt === correct) btn.classList.add('correct');
    else btn.style.opacity = '0.4';
  });
  document.getElementById('feedback').innerHTML = `
    <div style="margin-bottom: 12px;">Doğru cevap: <strong>${correct}</strong></div>
    <div style="text-align: left; max-width: 360px; margin: 0 auto;">
      ${leaderboard.map((p, i) => `
        <div class="leaderboard-row">
          <span class="rank ${i === 0 ? 'gold' : ''}">${i+1}.</span>
          <span style="flex: 1;">${p.name}</span>
          <span style="font-weight: 500;">${p.score.toLocaleString()}</span>
        </div>
      `).join('')}
    </div>
  `;
}

function renderGameOver({ leaderboard }) {
  const winner = leaderboard[0];
  render(`
    <div class="center">
      <div style="font-size: 56px;">🏆</div>
      <h1>Oyun bitti</h1>
      <p class="muted" style="margin-bottom: 2rem;">Kazanan: <strong>${winner.name}</strong></p>
    </div>
    <div style="max-width: 400px; margin: 0 auto;">
      ${leaderboard.map((p, i) => `
        <div class="leaderboard-row">
          <span class="rank ${i === 0 ? 'gold' : ''}">${i+1}.</span>
          <span style="flex: 1;">${p.name} ${p.name === myName ? '(sen)' : ''}</span>
          <span style="font-weight: 500;">${p.score.toLocaleString()}</span>
        </div>
      `).join('')}
    </div>
    <button class="btn-primary" style="width: 100%; margin-top: 2rem;" onclick="location.reload()">
      Yeni oyun
    </button>
  `);
}

// ── Socket handlers ──
function setupSocketHandlers() {
  socket.on('lobby_update', ({ players }) => renderLobby(players));
  socket.on('game_started', () => {
    document.getElementById('root').innerHTML = '<div class="center" style="padding: 3rem;"><h2>Oyun başlıyor...</h2></div>';
  });
  socket.on('question', renderQuestion);
  socket.on('reveal', renderReveal);
  socket.on('game_over', renderGameOver);
  socket.on('disconnect', () => {
    alert('Sunucuyla bağlantı koptu');
    location.reload();
  });
}

renderHome();
</script>
</body>
</html>
