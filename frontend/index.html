<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Footbally — Multiplayer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container {
    width: 100%;
    max-width: 720px;
    background: #1e293b;
    border-radius: 16px;
    padding: 2rem;
    border: 1px solid #334155;
  }
  h1 { font-size: 32px; font-weight: 600; margin-bottom: 8px; }
  h2 { font-size: 20px; font-weight: 500; line-height: 1.4; }
  .muted { color: #94a3b8; font-size: 14px; }
  .center { text-align: center; }
  input, button {
    font-family: inherit;
    font-size: 15px;
    padding: 12px 16px;
    border: 1px solid #475569;
    background: #334155;
    color: #f1f5f9;
    border-radius: 8px;
  }
  input { width: 100%; margin-bottom: 12px; }
  input:focus { outline: none; border-color: #3b82f6; }
  button {
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover:not(:disabled) { background: #475569; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: #3b82f6; border-color: #3b82f6; }
  .btn-primary:hover:not(:disabled) { background: #2563eb !important; }
  .btn-row { display: flex; gap: 10px; }
  .btn-row button { flex: 1; }
  .lobby-player {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: #0f172a;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .lobby-player .badge {
    background: #3b82f6;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .code-display {
    font-family: ui-monospace, monospace;
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 4px;
    background: #0f172a;
    padding: 16px;
    border-radius: 8px;
    margin: 1rem 0;
    text-align: center;
  }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .timer-bar-wrap {
    height: 8px;
    background: #0f172a;
    border-radius: 4px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .timer-bar { height: 100%; background: #3b82f6; transition: width 0.1s linear; }
  .options-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 10px;
  }
  .opt-btn {
    padding: 16px 18px;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .opt-btn.correct { background: #065f46 !important; border-color: #10b981 !important; }
  .opt-btn.wrong { background: #7f1d1d !important; border-color: #ef4444 !important; }
  .opt-letter {
    width: 26px; height: 26px; border-radius: 50%;
    background: #0f172a;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 500;
    flex-shrink: 0;
  }
  .leaderboard-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: #0f172a;
    border-radius: 8px;
    margin-bottom: 6px;
  }
  .rank { width: 24px; text-align: center; font-weight: 600; color: #94a3b8; }
  .rank.gold { color: #fbbf24; }
  .error { color: #ef4444; font-size: 13px; margin-top: 8px; text-align: center; }

  /* top bar */
  .top-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 6px;
    margin-bottom: 1.5rem;
    font-size: 13px;
    color: #64748b;
  }
  .conn-indicator { display: flex; align-items: center; gap: 5px; }
  .conn-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #10b981; flex-shrink: 0;
    transition: background 0.3s;
  }
  .conn-dot.off { background: #ef4444; }
  .top-sep { color: #334155; margin: 0 2px; }
  .lang-btn {
    background: none !important;
    border: none;
    padding: 2px 4px;
    color: #475569;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 400;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .lang-btn:hover:not(:disabled) { background: none !important; color: #cbd5e1; }
  .lang-btn.active { color: #f1f5f9; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <span class="conn-indicator" id="conn-indicator" style="display:none">
      <span class="conn-dot" id="conn-dot"></span>
      <span id="conn-text"></span>
    </span>
    <span class="top-sep" id="conn-sep" style="display:none">·</span>
    <button class="lang-btn" id="btn-tr" onclick="setLang('tr')">TR</button>
    <span class="top-sep">|</span>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  </div>
  <div id="root"></div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const BACKEND_URL = 'https://footbally-a7js.onrender.com';

// ── i18n ──
const i18n = {
  tr: {
    subtitle: 'Multiplayer futbol trivia',
    namePlaceholder: 'Adın',
    createRoom: 'Oda oluştur',
    joinRoom: 'Odaya katıl',
    enterName: 'Ad girmen gerek',
    joinFormTitle: 'Odaya katıl',
    joinFormSub: 'Arkadaşından 6 karakterlik kodu al',
    codePlaceholder: 'Oda kodu (ör. ABC123)',
    back: 'Geri',
    join: 'Katıl',
    invalidCode: 'Geçerli bir kod gir',
    connError: 'Sunucuya bağlanılamadı: ',
    lobbyTitle: 'Lobi',
    shareCode: 'Oda kodu — arkadaşlarınla paylaş:',
    players: 'Oyuncular',
    needMorePlayers: 'En az 2 oyuncu gerek',
    startGame: 'Oyunu başlat',
    waitingHost: "Host'un başlatmasını bekle...",
    question: 'Soru',
    answerSubmitted: 'Cevap gönderildi, diğerlerini bekliyor...',
    correctAnswer: 'Doğru cevap:',
    gameOver: 'Oyun bitti',
    winner: 'Kazanan:',
    you: '(sen)',
    newGame: 'Yeni oyun',
    gameStarting: 'Oyun başlıyor...',
    connected: 'Bağlı',
    disconnected: 'Bağlantı koptu',
    disconnectedAlert: 'Sunucuyla bağlantı koptu',
    code: 'Kod',
  },
  en: {
    subtitle: 'Multiplayer football trivia',
    namePlaceholder: 'Your name',
    createRoom: 'Create room',
    joinRoom: 'Join room',
    enterName: 'Please enter your name',
    joinFormTitle: 'Join a room',
    joinFormSub: 'Get the 6-character code from your friend',
    codePlaceholder: 'Room code (e.g. ABC123)',
    back: 'Back',
    join: 'Join',
    invalidCode: 'Enter a valid code',
    connError: 'Could not connect to server: ',
    lobbyTitle: 'Lobby',
    shareCode: 'Room code — share with your friends:',
    players: 'Players',
    needMorePlayers: 'Need at least 2 players',
    startGame: 'Start game',
    waitingHost: 'Waiting for host to start...',
    question: 'Question',
    answerSubmitted: 'Answer submitted, waiting for others...',
    correctAnswer: 'Correct answer:',
    gameOver: 'Game over',
    winner: 'Winner:',
    you: '(you)',
    newGame: 'New game',
    gameStarting: 'Game starting...',
    connected: 'Connected',
    disconnected: 'Disconnected',
    disconnectedAlert: 'Connection to server lost',
    code: 'Code',
  }
};

let lang = navigator.language.startsWith('tr') ? 'tr' : 'en';
function t(k) { return i18n[lang][k] || i18n.tr[k] || k; }

// init lang buttons
document.getElementById('btn-tr').classList.toggle('active', lang === 'tr');
document.getElementById('btn-en').classList.toggle('active', lang === 'en');
document.documentElement.lang = lang;

let _lastRender = null;

function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.getElementById('btn-tr').classList.toggle('active', l === 'tr');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  const connText = document.getElementById('conn-text');
  if (connText && connText.textContent) {
    connText.textContent = _socketConnected ? t('connected') : t('disconnected');
  }
  if (_lastRender) _lastRender();
}

// ── Connection status ──
let _socketConnected = false;

function setConnected(v) {
  _socketConnected = v;
  const indicator = document.getElementById('conn-indicator');
  const sep = document.getElementById('conn-sep');
  const dot = document.getElementById('conn-dot');
  const text = document.getElementById('conn-text');
  indicator.style.display = '';
  sep.style.display = '';
  dot.classList.toggle('off', !v);
  text.textContent = v ? t('connected') : t('disconnected');
}

// ── Core ──
const root = document.getElementById('root');
let socket = null;
let myName = '';
let isHost = false;
let currentCode = '';

function render(html) { root.innerHTML = html; }

// ── Home ──
function renderHome() {
  _lastRender = renderHome;
  render(`
    <div class="center" style="padding: 2rem 1rem;">
      <div style="font-size: 56px;">⚽</div>
      <h1>Footbally</h1>
      <p class="muted" style="margin-bottom: 2rem;">${t('subtitle')}</p>
      <div style="max-width: 320px; margin: 0 auto;">
        <input id="name-input" placeholder="${t('namePlaceholder')}" maxlength="16" />
        <div class="btn-row">
          <button id="create-btn" class="btn-primary">${t('createRoom')}</button>
          <button id="join-btn">${t('joinRoom')}</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('create-btn').onclick = () => {
    const name = document.getElementById('name-input').value.trim();
    if (!name) return alert(t('enterName'));
    myName = name;
    createRoom();
  };
  document.getElementById('join-btn').onclick = () => {
    const name = document.getElementById('name-input').value.trim();
    if (!name) return alert(t('enterName'));
    myName = name;
    renderJoinForm();
  };
}

// ── Join form ──
function renderJoinForm() {
  _lastRender = renderJoinForm;
  render(`
    <div class="center" style="padding: 2rem 1rem;">
      <h1>${t('joinFormTitle')}</h1>
      <p class="muted" style="margin-bottom: 2rem;">${t('joinFormSub')}</p>
      <div style="max-width: 320px; margin: 0 auto;">
        <input id="code-input" placeholder="${t('codePlaceholder')}" maxlength="6" style="text-transform: uppercase; text-align: center; letter-spacing: 2px;" />
        <div class="btn-row">
          <button id="back-btn">${t('back')}</button>
          <button id="join-btn" class="btn-primary">${t('join')}</button>
        </div>
        <div id="error" class="error"></div>
      </div>
    </div>
  `);
  document.getElementById('back-btn').onclick = renderHome;
  document.getElementById('join-btn').onclick = () => {
    const code = document.getElementById('code-input').value.trim().toUpperCase();
    if (code.length !== 6) {
      document.getElementById('error').textContent = t('invalidCode');
      return;
    }
    joinRoom(code);
  };
}

// ── Create / join room ──
async function createRoom() {
  try {
    const res = await fetch(`${BACKEND_URL}/create-room`, { method: 'POST' });
    const { code } = await res.json();
    joinRoom(code);
  } catch (err) {
    alert(t('connError') + err.message);
  }
}

function joinRoom(code) {
  currentCode = code;
  if (!socket) {
    socket = io(BACKEND_URL);
    setupSocketHandlers();
  }
  socket.emit('join_room', { code, name: myName }, (res) => {
    if (!res.ok) {
      document.getElementById('error') && (document.getElementById('error').textContent = res.error);
      return;
    }
    isHost = res.isHost;
    renderLobby([]);
  });
}

// ── Lobby ──
function renderLobby(players) {
  _lastRender = () => renderLobby(players);
  render(`
    <h1>${t('lobbyTitle')}</h1>
    <p class="muted">${t('shareCode')}</p>
    <div class="code-display">${currentCode}</div>
    <h2 style="margin-bottom: 12px;">${t('players')} (${players.length}/5)</h2>
    <div id="player-list">
      ${players.map((p, i) => `
        <div class="lobby-player">
          <span>${p}</span>
          ${i === 0 ? '<span class="badge">HOST</span>' : ''}
        </div>
      `).join('')}
    </div>
    ${isHost ? `
      <button id="start-btn" class="btn-primary" style="width: 100%; margin-top: 1.5rem;" ${players.length < 2 ? 'disabled' : ''}>
        ${players.length < 2 ? t('needMorePlayers') : t('startGame')}
      </button>
    ` : `
      <p class="muted center" style="margin-top: 1.5rem;">${t('waitingHost')}</p>
    `}
  `);
  if (isHost) {
    document.getElementById('start-btn').onclick = () => {
      socket.emit('start_game', {}, (res) => {
        if (!res.ok) alert(res.error);
      });
    };
  }
}

// ── Question ──
let qStartTs = 0;
let timerRaf = null;
let answered = false;

function renderQuestion({ index, total, question, sub, options, durationMs }) {
  // Don't update _lastRender — mid-question language switch won't re-render
  qStartTs = Date.now();
  answered = false;
  if (timerRaf) cancelAnimationFrame(timerRaf);

  render(`
    <div class="header-row">
      <span class="muted">${t('question')} ${index + 1} / ${total}</span>
      <span style="font-size: 13px;">${t('code')}: ${currentCode}</span>
    </div>
    <div class="timer-bar-wrap"><div id="timer-bar" class="timer-bar"></div></div>
    <div class="center" style="margin-bottom: 2rem; min-height: 80px;">
      <h2>${question}</h2>
      ${sub ? `<p class="muted" style="margin-top: 8px;">${sub}</p>` : ''}
    </div>
    <div class="options-grid">
      ${options.map((opt, i) => `
        <button class="opt-btn" data-opt="${encodeURIComponent(opt)}">
          <span class="opt-letter">${String.fromCharCode(65+i)}</span>
          <span>${opt}</span>
        </button>
      `).join('')}
    </div>
    <div id="feedback" class="center muted" style="margin-top: 1.5rem; min-height: 24px;"></div>
  `);

  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.onclick = () => {
      if (answered) return;
      answered = true;
      const opt = decodeURIComponent(btn.dataset.opt);
      socket.emit('submit_answer', { answer: opt });
      document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
      btn.style.borderColor = '#3b82f6';
      document.getElementById('feedback').textContent = t('answerSubmitted');
    };
  });

  const bar = document.getElementById('timer-bar');
  const tick = () => {
    const elapsed = Date.now() - qStartTs;
    const remaining = Math.max(0, durationMs - elapsed);
    bar.style.width = (remaining / durationMs * 100) + '%';
    if (remaining > 5000) bar.style.background = '#3b82f6';
    else if (remaining > 2500) bar.style.background = '#f59e0b';
    else bar.style.background = '#ef4444';
    if (remaining > 0) timerRaf = requestAnimationFrame(tick);
  };
  timerRaf = requestAnimationFrame(tick);
}

// ── Reveal ──
function renderReveal({ correct, leaderboard }) {
  cancelAnimationFrame(timerRaf);
  document.querySelectorAll('.opt-btn').forEach(btn => {
    const opt = decodeURIComponent(btn.dataset.opt);
    btn.disabled = true;
    if (opt === correct) btn.classList.add('correct');
    else btn.style.opacity = '0.4';
  });
  document.getElementById('feedback').innerHTML = `
    <div style="margin-bottom: 12px;">${t('correctAnswer')} <strong>${correct}</strong></div>
    <div style="text-align: left; max-width: 360px; margin: 0 auto;">
      ${leaderboard.map((p, i) => `
        <div class="leaderboard-row">
          <span class="rank ${i === 0 ? 'gold' : ''}">${i+1}.</span>
          <span style="flex: 1;">${p.name}</span>
          <span style="font-weight: 500;">${p.score.toLocaleString()}</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ── Game over ──
function renderGameOver({ leaderboard }) {
  const winner = leaderboard[0];
  _lastRender = () => renderGameOver({ leaderboard });
  render(`
    <div class="center">
      <div style="font-size: 56px;">🏆</div>
      <h1>${t('gameOver')}</h1>
      <p class="muted" style="margin-bottom: 2rem;">${t('winner')} <strong>${winner.name}</strong></p>
    </div>
    <div style="max-width: 400px; margin: 0 auto;">
      ${leaderboard.map((p, i) => `
        <div class="leaderboard-row">
          <span class="rank ${i === 0 ? 'gold' : ''}">${i+1}.</span>
          <span style="flex: 1;">${p.name} ${p.name === myName ? t('you') : ''}</span>
          <span style="font-weight: 500;">${p.score.toLocaleString()}</span>
        </div>
      `).join('')}
    </div>
    <button class="btn-primary" style="width: 100%; margin-top: 2rem;" onclick="location.reload()">
      ${t('newGame')}
    </button>
  `);
}

// ── Socket handlers ──
function setupSocketHandlers() {
  socket.on('connect', () => setConnected(true));
  socket.on('lobby_update', ({ players }) => renderLobby(players));
  socket.on('game_started', () => {
    _lastRender = null;
    root.innerHTML = `<div class="center" style="padding: 3rem;"><h2>${t('gameStarting')}</h2></div>`;
  });
  socket.on('question', renderQuestion);
  socket.on('reveal', renderReveal);
  socket.on('game_over', renderGameOver);
  socket.on('disconnect', () => {
    setConnected(false);
    alert(t('disconnectedAlert'));
    location.reload();
  });
}

renderHome();
</script>
</body>
</html>
